name: Publish GitHub Pages

# Publishes the gh-pages branch through the modern Pages deployment path.
# PR previews push to gh-pages first; this workflow makes them live when Pages
# is configured to deploy from GitHub Actions (not from a branch).
on:
  workflow_dispatch:
  push:
    branches: [gh-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
