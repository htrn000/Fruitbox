name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:

# Production and each PR preview deploy independently.
concurrency:
  group: pages-${{ github.event_name == 'pull_request' && format('preview-{0}', github.event.pull_request.number) || 'production' }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Skip draft PRs (until marked ready). Always run on close to clean up previews.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false ||
      github.event.action == 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        if: github.event.action != 'closed'
        run: uv sync --package fruitbox-ci --group build

      - name: Build PWA
        if: github.event.action != 'closed'
        env:
          VITE_BASE: >-
            ${{ github.event_name == 'pull_request'
                && format('/Fruitbox/pr-preview/pr-{0}/', github.event.pull_request.number)
                || '/Fruitbox/' }}
        run: uv run fruitbox-ci build-pwa

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: packages/fruitbox-pwa/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: ${{ github.event.action == 'closed' && 'remove' || 'deploy' }}

      - name: Deploy production
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/fruitbox-pwa/dist
          keep_files: true
