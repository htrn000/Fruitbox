name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  HF_MODEL_REPO: Fungster/fruitbox-ppo
  HF_MODEL_REVISION: main
  HF_ONNX_FILE: fruitbox_policy.onnx

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install build dependencies
        run: uv sync --extra cpu --group web --group build --all-packages

      - name: Resolve model revision
        id: model
        shell: python
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          import os
          from huggingface_hub import HfApi

          revision = os.environ["HF_MODEL_REVISION"]
          try:
              api = HfApi(token=os.environ.get("HF_TOKEN") or None)
              info = api.repo_info(
                  os.environ["HF_MODEL_REPO"],
                  revision=revision,
              )
              sha = info.sha
          except Exception as exc:
              print(f"Could not resolve Hugging Face revision ({exc}); using {revision!r} for cache key")
              sha = revision

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"sha={sha}\n")

      - uses: actions/cache@v4
        id: onnx-cache
        with:
          path: web_assets/fruitbox_policy.onnx
          key: hf-onnx-web-${{ env.HF_MODEL_REPO }}-${{ steps.model.outputs.sha }}

      - name: Download ONNX model
        if: steps.onnx-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRUITBOX_MODEL_MIRROR_URL: ${{ secrets.FRUITBOX_ONNX_MIRROR_URL }}
        run: |
          mkdir -p web_assets
          python .github/scripts/download_hf_onnx.py
          mv fruitbox_policy.onnx web_assets/

      - name: Build with pygbag
        run: uv run python tools/build_web.py

      - name: Verify web build artifacts
        run: uv run python tools/verify_web_build.py

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/build/web

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
