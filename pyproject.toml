[project]
name = "fruitbox"
version = "0.1.0"
description = "Grid-based fruitbox puzzle engine with pluggable solvers and PWA web app"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
    "typer",
]

[project.scripts]
fruitbox = "fruitbox.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
packages = ["fruitbox"]
